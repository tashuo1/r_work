server:
  port: 9000
  address: ${APP_HOST:127.0.0.1}

spring:
  application:
    name: ontology-server
  datasource:
    url: ${ONTOLOGY_DB_URL:jdbc:h2:file:./data/ontology-platform;MODE=MySQL;DATABASE_TO_UPPER=false;AUTO_SERVER=TRUE}
    driver-class-name: ${ONTOLOGY_DB_DRIVER:org.h2.Driver}
    username: ${ONTOLOGY_DB_USERNAME:sa}
    password: ${ONTOLOGY_DB_PASSWORD:}
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: ${ONTOLOGY_H2_CONSOLE:false}
      path: /h2-console

mybatis:
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: INFO
    com.ontology.lite: INFO
